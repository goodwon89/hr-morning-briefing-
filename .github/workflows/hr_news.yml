name: 인재경영실 Morning Briefing 자동 발송

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 오전 9시 KST (= UTC 00:00), 주말 제외 [schedule-refresh-20260326]
  workflow_dispatch:          # GitHub 웹에서 수동 실행 가능 (테스트용)

jobs:
  hr-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # news_archive.json 저장에 필요 (없으면 403 오류)

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install feedparser requests

      - name: HR 뉴스 수집 · 발송
        env:
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:    ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_RECIPIENTS:  ${{ secrets.EMAIL_RECIPIENTS }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}
        run: python hr_news.py
