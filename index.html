<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Morning Briefing | 상상인그룹 인재경영실</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
      background: #ffffff; color: #1a1a2a; min-height: 100vh;
    }

    /* ── 페이지 래퍼 ── */
    .page-wrap {
      max-width: 720px; margin: 0 auto; padding: 40px 32px 60px;
    }

    /* ── 헤더: 제목(좌) + 로고(우) ── */
    .site-header {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 16px;
      padding-bottom: 14px;
    }
    .site-header h1 {
      font-size: 28px; font-weight: 900; color: #1a1a2a;
      letter-spacing: -0.5px; line-height: 1.1;
    }
    .site-header .sub-info {
      font-size: 12px; color: #9ca3af; margin-top: 6px;
    }
    .site-header .logo-wrap img {
      height: 40px; display: block;
    }
    .site-header .logo-text {
      font-size: 14px; font-weight: 800; color: #1a1a2a;
    }
    .header-rule {
      border: none; border-top: 2px solid #1a1a2a; margin: 0 0 28px;
    }

    /* ── 검색·필터 바 ── */
    .toolbar {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .toolbar input {
      flex: 1; min-width: 200px; padding: 9px 14px; border-radius: 6px;
      border: 1px solid #e5e7eb; font-size: 13px; background: #fafafa;
      outline: none; transition: border .15s;
    }
    .toolbar input:focus { border-color: #1a1a2a; background: #fff; }
    .toolbar select {
      padding: 9px 12px; border-radius: 6px; border: 1px solid #e5e7eb;
      font-size: 13px; background: #fafafa; cursor: pointer;
    }

    /* ── 날짜 구분 ── */
    .date-block { margin-bottom: 36px; }
    .date-heading {
      font-size: 12px; color: #9ca3af; font-weight: 500;
      padding-bottom: 10px; margin-bottom: 0;
    }

    /* ── 섹션 ── */
    .section-block { margin-bottom: 4px; }
    .section-title-row {
      font-size: 16px; font-weight: 800; color: #1a1a2a;
      padding: 16px 0 10px; letter-spacing: -0.3px;
      border-top: 1px solid #1a1a2a;
    }

    /* ── 기사 행 ── */
    .article-table {
      width: 100%; border-collapse: collapse;
      margin-bottom: 0;
    }
    .article-table tr td { border-bottom: 1px solid #f0f0f0; }
    .article-table tr:last-child td { border-bottom: none; }

    .article-title-cell {
      padding: 11px 16px 11px 0;
      font-size: 13.5px; line-height: 1.65; color: #1a1a2a;
      vertical-align: top; width: 75%;
    }
    .article-title-cell a {
      color: #1a1a2a; font-weight: 600; text-decoration: none;
    }
    .article-title-cell a:hover { text-decoration: underline; }

    .article-meta-cell {
      padding: 11px 0 11px 8px;
      font-size: 12px; color: #9ca3af;
      white-space: nowrap; vertical-align: top;
      text-align: right; width: 25%;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: #9ca3af; font-size: 14px; line-height: 1.8;
    }

    /* ── 푸터 ── */
    .site-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      border-top: 1px solid #e5e7eb;
      margin-top: 40px; padding-top: 20px;
    }
    .site-footer .copy {
      font-size: 11px; color: #9ca3af; line-height: 1.7;
    }
    .site-footer .logo-wrap img { height: 28px; opacity: 0.6; }
    .site-footer .logo-text { font-size: 12px; font-weight: 700; color: #9ca3af; }

    @media (max-width: 600px) {
      .page-wrap { padding: 24px 18px 48px; }
      .site-header h1 { font-size: 22px; }
      .article-meta-cell { display: none; }
      .article-title-cell { width: 100%; padding-right: 0; }
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- 헤더 -->
  <header class="site-header">
    <div>
      <h1>HR Morning Briefing</h1>
      <div class="sub-info">상상인그룹 인재경영실 · 매일 오전 9시 자동 업데이트</div>
    </div>
    <div class="logo-wrap" id="headerLogo">
      <!-- JS로 로고 삽입 -->
    </div>
  </header>
  <hr class="header-rule">

  <!-- 검색·필터 -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="키워드 검색...">
    <select id="monthFilter"><option value="">전체 기간</option></select>
  </div>

  <!-- 아카이브 본문 -->
  <div id="archiveRoot"></div>

  <!-- 푸터 -->
  <footer class="site-footer">
    <div class="copy">
      Copyright 2026 상상인그룹 인재경영실, All rights reserved.
    </div>
    <div class="logo-wrap" id="footerLogo">
      <!-- JS로 로고 삽입 -->
    </div>
  </footer>

</div>

<script>
const SECTION_META = {
  ai_hr:       { icon: "🤖", title: "AI·AX × HR 인사이트" },
  hr_insight:  { icon: "📋", title: "HR 인사이트" },
  labor:       { icon: "💼", title: "노동·고용 트렌드" },
  org_culture: { icon: "🏢", title: "조직문화·리더십" },
};
const SECTION_ORDER = ["ai_hr","hr_insight","labor","org_culture"];

let allData = [];

/* 로고 삽입 */
function insertLogos() {
  const logoImg = '<img src="logo.png" alt="상상인그룹">';
  const fallback = '<span class="logo-text">상상인그룹</span>';
  ["headerLogo","footerLogo"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const img = document.createElement("img");
    img.src = "logo.png";
    img.alt = "상상인그룹";
    img.style.cssText = id === "headerLogo" ? "height:40px;display:block;" : "height:28px;opacity:0.6;";
    img.onerror = function() {
      el.innerHTML = `<span style="font-size:${id==='headerLogo'?'14':'12'}px;font-weight:800;color:${id==='headerLogo'?'#1a1a2a':'#9ca3af'};">상상인그룹</span>`;
    };
    el.appendChild(img);
  });
}

async function loadArchive() {
  try {
    const resp = await fetch("news_archive.json?" + Date.now());
    if (!resp.ok) throw new Error("not found");
    allData = await resp.json();
    populateMonthFilter();
    render();
  } catch(e) {
    document.getElementById("archiveRoot").innerHTML =
      '<div class="empty-state">아카이브 데이터를 불러오는 중입니다.<br>첫 실행 후 자동으로 채워집니다.</div>';
  }
}

function populateMonthFilter() {
  const months = [...new Set(allData.map(e => e.date.slice(0,7)))].sort().reverse();
  const sel = document.getElementById("monthFilter");
  months.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m.replace("-","년 ") + "월";
    sel.appendChild(opt);
  });
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00+09:00");
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${String(d.getFullYear()).slice(2)}.${mm}.${dd} (${days[d.getDay()]})`;
}

function makeLinkedText(title, url) {
  const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return `<a href="${url}" target="_blank">${esc(title)}</a>`;
}

function render() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const month = document.getElementById("monthFilter").value;
  const root  = document.getElementById("archiveRoot");

  let filtered = allData;
  if (month)  filtered = filtered.filter(e => e.date.startsWith(month));
  if (query)  filtered = filtered.filter(e =>
    e.news && e.news.some(a =>
      (a.title||"").toLowerCase().includes(query) ||
      (a.description||"").toLowerCase().includes(query)
    )
  );

  if (!filtered.length) {
    root.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }

  root.innerHTML = filtered.map(entry => {
    const bySection = {};
    (entry.news || []).forEach(a => {
      const s = a.section || "etc";
      (bySection[s] = bySection[s] || []).push(a);
    });

    const sectionsHtml = SECTION_ORDER.filter(k => bySection[k]?.length).map(k => {
      const meta = SECTION_META[k] || { icon:"📌", title:k };
      const rows = bySection[k].map(a => {
        const pubDate = a.pub_date || "";
        const src     = a.source  || "";
        const meta2   = [src, pubDate].filter(Boolean).join(" | ");
        return `<tr>
          <td class="article-title-cell">${makeLinkedText(a.title||"", a.url||"#")}</td>
          <td class="article-meta-cell">${meta2}</td>
        </tr>`;
      }).join("");

      return `<div class="section-block">
        <div class="section-title-row">${meta.icon}&nbsp; ${meta.title}</div>
        <table class="article-table"><tbody>${rows}</tbody></table>
      </div>`;
    }).join("");

    return `<div class="date-block">
      <div class="date-heading">📅 ${fmtDate(entry.date)}</div>
      ${sectionsHtml || '<div class="empty-state" style="padding:16px 0">기사 없음</div>'}
    </div>`;
  }).join("");
}

document.getElementById("searchInput").addEventListener("input", render);
document.getElementById("monthFilter").addEventListener("change", render);

insertLogos();
loadArchive();
</script>
</body>
</html>
